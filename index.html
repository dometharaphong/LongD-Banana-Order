<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบสั่งวัตถุดิบ - LongD Banana</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun','Noto Sans Thai',sans-serif; background: #f5f0eb; min-height: 100vh; }

.form-view { max-width: 480px; margin: 0 auto; padding: 0 0 80px 0; }

.form-header { background: #3e2008; color: #f5f0eb; padding: 14px 20px 12px; position: sticky; top: 0; z-index: 100; }
.logo-row { display: flex; align-items: center; gap: 10px; }
.logo-img { width: 48px; height: 48px; object-fit: contain; background: #fff; border-radius: 50%; padding: 2px; flex-shrink: 0; }
.header-text h1 { font-size: 16px; font-weight: 800; }
.header-text p { font-size: 11px; color: #c8956c; margin-top: 1px; }

.meta-section { background: #fff; padding: 16px 20px; border-bottom: 1px solid #e8ddd4; }
.meta-section label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600; }
.meta-section select, .meta-section input {
  width: 100%; padding: 10px 12px; border: 1.5px solid #d4b896;
  border-radius: 8px; font-size: 15px; font-family: inherit;
  color: #3e2008; background: #fdfaf7; margin-bottom: 12px; -webkit-appearance: none;
}
.meta-section select:focus, .meta-section input:focus { outline: none; border-color: #8b5e3c; background: #fff; }

.section-block { margin-top: 8px; background: #fff; }
.section-title { background: #3e2008; color: #f5f0eb; padding: 10px 20px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

.item-row { display: flex; align-items: center; padding: 11px 20px; border-bottom: 1px solid #f5f0eb; gap: 10px; }
.item-row:last-child { border-bottom: none; }
.item-num { font-size: 11px; color: #bbb; width: 20px; flex-shrink: 0; text-align: right; }
.item-name { flex: 1; font-size: 14px; color: #2c1810; line-height: 1.3; }
.item-input { width: 70px; padding: 8px; border: 1.5px solid #d4b896; border-radius: 8px; font-size: 16px; text-align: center; font-family: inherit; color: #3e2008; background: #fdfaf7; flex-shrink: 0; }
.item-input:focus { outline: none; border-color: #8b5e3c; background: #fff; }

.submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8ddd4; padding: 12px 20px; display: flex; gap: 10px; max-width: 480px; margin: 0 auto; }
.btn-submit { flex: 1; background: #3e2008; color: #f5f0eb; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-submit:active { background: #8b5e3c; }
.btn-clear { background: #f5f0eb; color: #888; border: 1.5px solid #d4b896; border-radius: 10px; padding: 14px 18px; font-size: 13px; font-family: inherit; cursor: pointer; }

/* PRINT */
.print-view { display: none; max-width: 720px; margin: 20px auto; background: #fff; padding: 20px; }
.print-view.active { display: block; }

.print-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2.5px solid #3e2008; }
.print-company { display: flex; gap: 12px; align-items: center; }
.print-logo-img { width: 70px; height: 70px; object-fit: contain; }
.print-company-info h2 { font-size: 13px; font-weight: 800; color: #3e2008; }
.print-company-info p { font-size: 9px; color: #555; line-height: 1.6; margin-top: 2px; }
.print-doc-box { border: 2px solid #3e2008; padding: 8px 16px; text-align: center; min-width: 130px; }
.print-doc-box h3 { font-size: 13px; font-weight: 800; color: #3e2008; line-height: 1.6; }

.print-meta-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 11px; }
.print-meta-table td { padding: 5px 8px; border: 1px solid #999; }
.label-cell { background: #f5ede4; font-weight: 700; width: 140px; color: #3e2008; }

.print-items-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px; }
.print-items-table th { background: #3e2008; color: #f5f0eb; padding: 6px; text-align: center; font-size: 10px; font-weight: 700; }
.print-items-table td { border: 1px solid #bbb; padding: 5px 6px; }
.print-items-table tr:nth-child(even) td { background: #fdfaf7; }
.td-num { text-align: center; width: 28px; }
.td-qty { text-align: center; width: 48px; font-weight: 700; color: #3e2008; }
.td-send, .td-check { text-align: center; width: 48px; }
.td-note { width: 75px; }
.section-row td { background: #e8d5c0 !important; font-weight: 800; font-size: 10px; color: #3e2008; }

.print-notes { border: 1px solid #bbb; padding: 8px 10px; font-size: 9px; color: #444; line-height: 1.8; margin-bottom: 12px; }
.print-sigs { display: flex; justify-content: space-around; padding-top: 16px; border-top: 1px solid #bbb; }
.sig-box { text-align: center; font-size: 10px; }
.sig-line { border-bottom: 1px solid #333; width: 120px; margin: 0 auto 4px; padding-bottom: 22px; }
.sig-name { font-weight: 700; color: #3e2008; }
.sig-date { color: #888; font-size: 9px; }

.print-actions { padding: 16px; background: #f5f0eb; display: flex; gap: 10px; justify-content: center; }
.btn-print { background: #3e2008; color: #fff; border: none; padding: 12px 28px; font-size: 15px; font-family: inherit; border-radius: 8px; cursor: pointer; font-weight: 700; }
.btn-back { background: #fff; color: #3e2008; border: 2px solid #3e2008; padding: 12px 20px; font-size: 14px; font-family: inherit; border-radius: 8px; cursor: pointer; font-weight: 600; }

@media print {
  body { background: #fff; }
  .print-actions { display: none !important; }
  .form-view { display: none !important; }
  .print-view { display: block !important; max-width: 100%; margin: 0; padding: 8px; }
  @page { margin: 8mm; size: A4 portrait; }
}
</style>
</head>

<div class="form-view" id="formView">
  <div class="form-header">
    <div class="logo-row">
      <img class="logo-img" id="headerLogo" alt="LongD Banana">
      <div class="header-text">
        <h1>LongD Banana</h1>
        <p>กล้วยทอด &amp; กล้วยปิ้ง | ใบสั่งวัตถุดิบ</p>
      </div>
    </div>
  </div>

  <div class="meta-section">
    <label>สาขา</label>
    <select id="branch">
      <option value="">— เลือกสาขา —</option>

      <option>สาขา 4 ปตท. สุวินทวงศ์ กม. 36 (ขาเข้า)</option>

    <label>ชื่อพนักงานผู้สั่ง</label>
    <input type="text" id="staffName" placeholder="ชื่อ-นามสกุล">
    <label>วันที่สั่ง</label>
    <input type="date" id="orderDate">
  </div>

  <div class="section-block">
    <div class="section-title">📦 บรรจุภัณฑ์</div>
    <div id="items-packaging"></div>
  </div>
  <div class="section-block">
    <div class="section-title">🍌 วัตถุดิบ</div>
    <div id="items-ingredient"></div>
  </div>
  <div class="section-block">
    <div class="section-title">🧹 อุปกรณ์ทำความสะอาด</div>
    <div id="items-cleaning"></div>
  </div>

  <div class="submit-bar">
    <button class="btn-clear" onclick="clearForm()">ล้าง</button>
    <button class="btn-submit" onclick="generateDoc()">สร้างใบสั่ง ➜</button>
  </div>
</div>

<div class="print-view" id="printView">
  <div class="print-actions">
    <button class="btn-back" onclick="goBack()">◀ แก้ไข</button>
    <button class="btn-print" onclick="window.print()">🖨️ พิมพ์</button>
  </div>
  <div id="docContent"></div>
</div>

document.getElementById('headerLogo').src = LOGO_B64;

function renderItems() {
  ['packaging','ingredient','cleaning'].forEach(cat => {
    const container = document.getElementById('items-' + cat);
    container.innerHTML = '';
    items[cat].forEach((name, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `<span class="item-num">${i+1}</span>
        <span class="item-name">${name}</span>
        <input class="item-input" type="number" min="0" placeholder="0"
          id="qty_${cat}_${i}" inputmode="numeric">`;
      container.appendChild(row);
    });
  });
}

function getTodayStr() { return new Date().toISOString().split('T')[0]; }

function formatDateTH(dateStr) {
  if (!dateStr) return '-';
  const [y,m,d] = dateStr.split('-');
  const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543}`;
}

function clearForm() {
  document.getElementById('branch').value = '';
  document.getElementById('staffName').value = '';
  document.getElementById('orderDate').value = getTodayStr();
  ['packaging','ingredient','cleaning'].forEach(cat => {
    items[cat].forEach((_, i) => { const el = document.getElementById('qty_'+cat+'_'+i); if(el) el.value=''; });
  });
}

function generateDoc() {
  const branch = document.getElementById('branch').value;
  const staff = document.getElementById('staffName').value.trim();
  const date = document.getElementById('orderDate').value;
  if (!branch) { alert('กรุณาเลือกสาขา'); return; }
  if (!staff) { alert('กรุณากรอกชื่อพนักงาน'); return; }

  const sections = [
    { label: 'บรรจุภัณฑ์', cat: 'packaging' },
    { label: 'วัตถุดิบ', cat: 'ingredient' },
    { label: 'อุปกรณ์ทำความสะอาด', cat: 'cleaning' }
  ];

  let allRows = [];
  sections.forEach(sec => {
    let secRows = [];
    items[sec.cat].forEach((name, i) => {
      const val = document.getElementById('qty_'+sec.cat+'_'+i).value;
      if (val !== '' && parseInt(val) > 0) secRows.push({ name, qty: parseInt(val) });
    });
    if (secRows.length > 0) {
      allRows.push({ isSectionHeader: true, label: sec.label });
      secRows.forEach(r => allRows.push(r));
    }
  });

  if (allRows.length === 0) { alert('กรุณากรอกจำนวนอย่างน้อย 1 รายการ'); return; }

  let rowNum = 1;
  let tableRows = allRows.map(row => {
    if (row.isSectionHeader) return `<tr class="section-row"><td colspan="7">▶ ${row.label}</td></tr>`;
    const n = rowNum++;
    return `<tr><td class="td-num">${n}</td><td>${row.name}</td><td class="td-qty">${row.qty}</td><td class="td-send"></td><td class="td-check"></td><td class="td-check"></td><td class="td-note"></td></tr>`;
  }).join('');

  const dataCount = rowNum - 1;
  for (let i = dataCount; i < Math.max(20, dataCount+3); i++) {
    tableRows += `<tr><td class="td-num">${i+1}</td><td></td><td class="td-qty"></td><td class="td-send"></td><td class="td-check"></td><td class="td-check"></td><td class="td-note"></td></tr>`;
  }

  document.getElementById('docContent').innerHTML = `
    <div style="font-family:'Sarabun','Noto Sans Thai',sans-serif;">
      <div class="print-top">
        <div class="print-company">
          <img class="print-logo-img" src="${LOGO_B64}" alt="LongD Banana">
          <div class="print-company-info">
            <h2>LongD Banana กล้วยทอด &amp; กล้วยปิ้ง</h2>
            <p>ใบกำกับการรับ / ส่งพัสดุ</p>
          </div>
        </div>
        <div class="print-doc-box"><h3>ใบกำกับการรับ /<br>ส่งพัสดุ</h3></div>
      </div>
      <table class="print-meta-table">
        <tr>
          <td class="label-cell">ชื่อร้าน</td><td>LongD Banana</td>
          <td class="label-cell">วันที่รับ/ส่งพัสดุ</td><td>${formatDateTH(date)}</td>
          <td rowspan="2" style="font-size:10px;vertical-align:top;padding:4px 8px;">
            <strong>สถานที่ดำเนินการ</strong><br>
            <table style="width:100%;border-collapse:collapse;margin-top:4px;">
              <tr><td style="border:1px solid #999;padding:2px 6px;text-align:center;font-size:9px;">รับพัสดุ</td><td style="border:1px solid #999;padding:2px 6px;text-align:center;font-size:9px;">ส่งพัสดุ</td></tr>
              <tr><td style="border:1px solid #999;padding:4px 6px;text-align:center;">☐</td><td style="border:1px solid #999;padding:4px 6px;text-align:center;">☑</td></tr>
            </table>
          </td>
        </tr>
        <tr>
          <td class="label-cell">ชื่อพนักงานประจำสาขา</td><td>${staff}</td>
          <td class="label-cell">สาขาที่ :</td><td>${branch}</td>
        </tr>
      </table>
      <table class="print-items-table">
        <thead><tr>
          <th class="td-num">ลำดับ</th><th>รายละเอียด</th>
          <th class="td-qty">จำนวน<br>สั่ง</th><th class="td-send">จำนวน<br>ส่ง</th>
          <th class="td-check">ตรวจนับ<br>เกิน</th><th class="td-check">ตรวจนับ<br>ขาด/เสียหาย</th>
          <th class="td-note">หมายเหตุ</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="print-notes">
        <div>1. ผู้ตรวจสอบต้องตรวจสอบสภาพ,จำนวน,เอกสารใบรับประกัน,หรืออื่นๆ(ถ้ามี) และลงชื่อผู้ตรวจสอบก่อนการขนส่ง</div>
        <div>2. หากพบสินค้าหรือพัสดุผิดปกติก่อนการขนส่ง ต้องแจ้งให้ผู้อนุมัติส่ง และหัวหน้างานรับทราบก่อนการรับพัสดุ พร้อมทั้งถ่ายรูปไว้เป็นหลักฐาน</div>

      <div style="height:36px;"></div>
      <div class="print-sigs">
        <div class="sig-box"><div class="sig-line"></div><div class="sig-name">ผู้อนุมัติส่ง</div><div class="sig-date">(............/............/............)</div></div>

      </div>
    </div>`;

  document.getElementById('formView').style.display = 'none';
  document.getElementById('printView').classList.add('active');
  window.scrollTo(0,0);

}
